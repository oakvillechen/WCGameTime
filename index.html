<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorldCupGameTime - World Cup 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  </head>
  <body>
    <div id="app">
      <header>
        <div class="header-top">
          <div class="logo">
            <h1><span id="title-1">WorldCup</span><span id="title-2">GameTime</span></h1>
            <div class="subtitle" id="app-subtitle">FIFA World Cup 2026™ Companion</div>
          </div>
          <button id="lang-toggle" class="lang-btn" title="Switch language">中文</button>
        </div>
        <nav id="desktop-nav">
          <button class="tab-btn active" data-target="tab-today">Today's Games</button>
          <button class="tab-btn" data-target="tab-schedule">Schedule</button>
          <button class="tab-btn" data-target="tab-groups">Groups</button>
          <button class="tab-btn" data-target="tab-standings">Standings</button>
        </nav>
      </header>

      <main>
        <div id="tab-today" class="tab-content active">
          <!-- Rendered by today.js -->
        </div>

        <div id="tab-schedule" class="tab-content">
          <!-- Rendered by schedule.js -->
        </div>

        <div id="tab-groups" class="tab-content">
          <!-- Rendered by schedule.js (groups) -->
        </div>

        <div id="tab-standings" class="tab-content">
          <!-- Rendered by teamsTable.js -->
        </div>
      </main>
    </div>

    <!-- Team Modal -->
    <div id="team-modal" class="modal hidden">
      <div class="modal-content glass-panel">
        <button class="close-btn">&times;</button>
        <div id="modal-body"></div>
      </div>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav id="mobile-nav" class="mobile-bottom-nav">
      <button class="mobile-nav-btn active" data-target="tab-today">
        <span class="mobile-nav-icon">⚽</span>
        <span class="mobile-nav-label">Today</span>
      </button>
      <button class="mobile-nav-btn" data-target="tab-schedule">
        <span class="mobile-nav-icon">📅</span>
        <span class="mobile-nav-label">Schedule</span>
      </button>
      <button class="mobile-nav-btn" data-target="tab-groups">
        <span class="mobile-nav-icon">🏆</span>
        <span class="mobile-nav-label">Groups</span>
      </button>
      <button class="mobile-nav-btn" data-target="tab-standings">
        <span class="mobile-nav-icon">📊</span>
        <span class="mobile-nav-label">Standings</span>
      </button>
    </nav>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
